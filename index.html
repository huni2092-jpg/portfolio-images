<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신성훈 | AI Art Director Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --bg-color: #f4f4f4;
            --text-color: #333;
            --header-bg: rgba(255, 255, 255, 0.90);
            --header-border: #e0e0e0;
            --card-bg: #fff;
            --card-shadow: rgba(0, 0, 0, 0.08);
            --link-container-bg: #fafafa;
            --accent-blue: #1428A0;
            --accent-hover: #0c1a66;
            --cursor-color: rgba(20, 40, 160, 0.5);
        }

        [data-theme="dark"] {
            --bg-color: #0f0f11;
            --text-color: #f0f0f0;
            --header-bg: rgba(15, 15, 17, 0.90);
            --header-border: #222;
            --card-bg: #1a1a1d;
            --card-shadow: rgba(0, 0, 0, 0.8);
            --link-container-bg: #222226;
            --accent-blue: #4263eb;
            --accent-hover: #5c7cfa;
            --cursor-color: rgba(66, 99, 235, 0.5);
        }

        /* Base Styles & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* Scroll Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--accent-blue);
            width: 0%;
            z-index: 10000;
            transition: width 0.1s;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-blue);
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid var(--cursor-color);
            transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease;
        }
        .cursor-hovering {
            width: 60px;
            height: 60px;
            background-color: var(--cursor-color);
            border-color: transparent;
        }

        /* Header Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--header-border);
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
        }
        .logo-wrap {
            display: flex;
            flex-direction: column;
        }
        header h1 {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 1px;
        }
        header h1 span { color: var(--accent-blue); }
        
        /* AI Prompt Typing Effect */
        .ai-prompt {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #888;
            margin-top: 2px;
            min-height: 18px;
        }
        .cursor-blink {
            display: inline-block;
            width: 6px;
            height: 12px;
            background-color: var(--accent-blue);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        .nav-links li a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s ease;
            position: relative;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-blue);
            transition: width 0.3s ease;
        }
        .nav-links li a:hover::after { width: 100%; }

        /* Theme Toggle */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-color);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .theme-toggle:hover { transform: scale(1.2) rotate(15deg); }

        /* Portfolio Container */
        .portfolio-container {
            max-width: 1000px;
            margin: 140px auto 80px auto;
            padding: 0 20px;
        }

        /* Page Item */
        .page-item {
            margin-bottom: 100px;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.4s ease, box-shadow 0.4s ease;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 15px 35px var(--card-shadow);
            overflow: hidden;
            scroll-margin-top: 120px;
        }
        .page-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .page-item:hover {
            box-shadow: 0 25px 50px var(--card-shadow);
            transform: translateY(-5px);
        }

        /* Image Styles */
        .page-item img {
            display: block;
            width: 100%;
            height: auto;
            border-bottom: 1px solid var(--header-border);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .page-item img:hover {
            opacity: 0.95;
            transform: scale(1.01);
        }

        /* Link Button Container */
        .link-container {
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            background: var(--link-container-bg);
        }

        /* Hyperlink Button Design */
        .video-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            background-color: var(--accent-blue);
            text-decoration: none;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .video-btn::before {
            content: '▶';
            margin-right: 8px;
            font-size: 0.8rem;
        }
        .video-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        /* Lightbox Styles */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.show {
            display: flex;
            opacity: 1;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .lightbox.show img { transform: scale(1); }
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: 300;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 50px 20px;
            background: var(--card-bg);
            font-size: 0.85rem;
            color: #777;
            border-top: 1px solid var(--header-border);
            font-family: 'Space Mono', monospace;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            * { cursor: auto; }
            .cursor-dot, .cursor-outline { display: none; }
            header {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }
            .nav-links { gap: 15px; font-size: 0.85rem; }
            .theme-toggle { position: absolute; top: 15px; right: 20px; }
            .ai-prompt { display: none; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" data-cursor></div>
    <div class="cursor-outline" data-cursor></div>

    <div id="progress-bar"></div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Fullscreen Image">
    </div>

    <header>
        <div class="logo-wrap">
            <h1>SHIN SUNG HOON <span>|</span> PORTFOLIO</h1>
            <div class="ai-prompt"><span id="typing-text"></span><span class="cursor-blink"></span></div>
        </div>
        <ul class="nav-links">
            <li><a class="hover-target" onclick="scrollToPage(1)">Profile</a></li>
            <li><a class="hover-target" onclick="scrollToPage(5)">Life Style</a></li>
            <li><a class="hover-target" onclick="scrollToPage(15)">F&B</a></li>
            <li><a class="hover-target" onclick="scrollToPage(24)">Beauty</a></li>
            <li><a class="hover-target" onclick="scrollToPage(28)">Etc</a></li>
        </ul>
        <button class="theme-toggle hover-target" id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </header>

    <main class="portfolio-container" id="portfolio-list">
    </main>

    <footer>
        <p>SYSTEM.EXIT(0); // &copy; 2026 Shin Sung Hoon.</p>
    </footer>

    <script>
        /* 1. Custom Cursor Logic */
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        function setupCursorHover() {
            const hoverTargets = document.querySelectorAll('a, button, img, .hover-target');
            hoverTargets.forEach(target => {
                target.addEventListener('mouseenter', () => cursorOutline.classList.add('cursor-hovering'));
                target.addEventListener('mouseleave', () => cursorOutline.classList.remove('cursor-hovering'));
            });
        }

        /* 2. Scroll Progress Bar */
        window.onscroll = function() {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";
        };

        /* 3. AI Typing Effect */
        const textToType = "> Prompt: Generate an AI Expert Art Director... Done.";
        const typeSpeed = 50;
        let charIndex = 0;
        
        function typeWriter() {
            if (charIndex < textToType.length) {
                document.getElementById("typing-text").innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, typeSpeed);
            }
        }
        setTimeout(typeWriter, 1000); 

        /* 4. Link Data & Content Generation */
        const pageLinks = {
            6: [
                { title: "대다모 캠페인 영상 1", url: "https://www.youtube.com/watch?v=ry7HVj5LCIc" },
                { title: "대다모 캠페인 영상 2", url: "https://www.youtube.com/watch?v=X8Br4d-IzSk" }
            ],
            8: [
                { title: "대다모 헤어리즘 영상", url: "https://www.youtube.com/watch?v=GDVkB8L-d3A" }
            ],
            9: [
                { title: "블루 ABC 데이 영상", url: "https://www.youtube.com/watch?v=hvTQfvWBehY&si=exzTeKqGgaFrlJoL" }
            ],
            11: [
                { title: "블랙 ABC 데이 영상", url: "https://www.youtube.com/watch?v=vfh5X2mjWWI" }
            ],
            12: [
                { title: "U+ 폴더블7 런칭 캠페인", url: "https://www.youtube.com/watch?v=CpGVzs3c0_s" }
            ],
            14: [
                { title: "티머니GO 퍼포먼스 영상", url: "https://www.youtube.com/watch?v=hgRz4gRuo-A" }
            ],
            16: [
                { title: "써브웨이 잠봉 컬렉션 영상", url: "https://www.youtube.com/watch?v=2Tuys3QTjM4" }
            ],
            18: [
                { title: "써브웨이 썹픽 캠페인 1", url: "https://www.youtube.com/watch?time_continue=1&v=-1eeVl8ObE0&embeds_referring_euri=https%3A%2F%2Fwww.adqua.co.kr%2F&source_ve_path=Mjg2NjY" },
                { title: "써브웨이 썹픽 캠페인 2", url: "https://www.youtube.com/watch?v=uGP6-ELEBOU" }
            ],
            21: [
                { title: "써브웨이 60주년 필름", url: "https://www.youtube.com/watch?v=cgoHTpFWKDQ" }
            ],
            22: [
                { title: "사세 캠페인 영상 1", url: "https://www.youtube.com/watch?v=0y4KND0F37w" },
                { title: "사세 캠페인 영상 2", url: "https://www.youtube.com/watch?v=ACOHpNnHLWw" }
            ],
            23: [
                { title: "하루야채 캠페인 영상", url: "https://www.youtube.com/watch?v=pQ6D-J1KxXU" }
            ],
            25: [
                { title: "더마펌 캠페인 영상 1", url: "https://www.youtube.com/watch?v=puTpPsK-WZg" },
                { title: "더마펌 캠페인 영상 2", url: "https://www.youtube.com/watch?v=AuxWxMIl0m4&si=F1RvCMY7R_Qom_Jy" }
            ],
            26: [
                { title: "가히 캠페인 영상 1", url: "https://tvcf.co.kr/play/bh05525-896869" },
                { title: "가히 캠페인 영상 2", url: "https://tvcf.co.kr/play/ah06567-896682" },
                { title: "가히 캠페인 영상 3", url: "https://tvcf.co.kr/play/bh02644-897733" }
            ],
            27: [
                { title: "플랜트콜라겐 영상 1", url: "https://www.youtube.com/watch?v=6yhMSjBaZME" },
                { title: "플랜트콜라겐 영상 2", url: "https://www.youtube.com/watch?v=GsU7NtayUew" }
            ],
            28: [
                { title: "기타 TVCF 영상", url: "https://star.tvcf.co.kr/IL0223162E6CD/shots" }
            ]
        };

        const totalPages = 28;
        const container = document.getElementById('portfolio-list');

        for (let i = 1; i <= totalPages; i++) {
            const article = document.createElement('article');
            article.className = 'page-item';
            article.id = `page-${i}`;

            const img = document.createElement('img');
            
            // --- 깃허브 Raw 이미지 주소 연동 (이 부분이 핵심입니다!) ---
            const gitHubImgUrl = `https://raw.githubusercontent.com/huni2092-jpg/portfolio-images/main/${i}.jpg`;
            img.src = gitHubImgUrl;
            // --------------------------------------------------------

            img.alt = `Portfolio Page ${i}`;
            img.loading = "lazy";
            img.classList.add('hover-target');
            
            img.onclick = () => openLightbox(gitHubImgUrl); // 라이트박스에도 똑같은 주소 적용
            
            article.appendChild(img);

            if (pageLinks[i]) {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'link-container';

                pageLinks[i].forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = 'video-btn hover-target';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = link.title;
                    linkContainer.appendChild(a);
                });

                article.appendChild(linkContainer);
            }

            container.appendChild(article);
        }

        /* Call setup for custom cursor after DOM is built */
        setupCursorHover();

        /* 5. Scroll Fade-in Animation */
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, observerOptions);

        document.querySelectorAll('.page-item').forEach(item => {
            observer.observe(item);
        });

        /* 6. Navigation Scroll */
        function scrollToPage(pageNum) {
            const targetElement = document.getElementById(`page-${pageNum}`);
            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth' });
            }
        }

        /* 7. Dark Mode Toggle */
        let isDarkMode = false;
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-toggle');
            
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                body.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            } else {
                body.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
        }

        /* 8. Lightbox Logic */
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden'; 
            cursorOutline.classList.remove('cursor-hovering');
        }

        function closeLightbox() {
            lightbox.classList.remove('show');
            document.body.style.overflow = ''; 
        }
    </script>
</body>
</html>
