<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신성훈 | AI Art Director Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables - Refined Premium Palette */
        :root {
            --bg-color: #fbfbfd;
            --text-color: #1d1d1f;
            --header-bg: rgba(251, 251, 253, 0.85);
            --header-border: rgba(0, 0, 0, 0.05);
            --card-bg: #ffffff;
            --card-shadow: rgba(0, 0, 0, 0.04);
            --card-shadow-hover: rgba(0, 0, 0, 0.08);
            --link-container-bg: #ffffff;
            --accent-blue: #1428A0; /* 삼성 블루 */
            --accent-hover: #0c1a66;
            --cursor-color: rgba(20, 40, 160, 0.4);
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --header-bg: rgba(0, 0, 0, 0.85);
            --header-border: rgba(255, 255, 255, 0.1);
            --card-bg: #0a0a0a;
            --card-shadow: rgba(0, 0, 0, 0.5);
            --card-shadow-hover: rgba(0, 0, 0, 0.8);
            --link-container-bg: #0a0a0a;
            --accent-blue: #4263eb;
            --accent-hover: #5c7cfa;
            --cursor-color: rgba(66, 99, 235, 0.4);
        }

        /* Base Styles & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
        }

        /* Scroll Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--accent-blue);
            width: 0%;
            z-index: 10000;
            transition: width 0.1s ease-out;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-blue);
        }
        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 1px solid var(--cursor-color);
            transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease;
        }
        .cursor-hovering {
            width: 60px;
            height: 60px;
            background-color: var(--cursor-color);
            border-color: transparent;
        }

        /* ======= Hero Intro Section ======= */
        #hero-section {
            position: relative;
            height: 300vh;
            background-color: #000;
            z-index: 2000;
        }
        .hero-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .hero-group {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            will-change: transform, opacity;
            text-align: center;
            opacity: 0;
        }
        .hero-logo {
            width: 350px;
            filter: drop-shadow(0 10px 30px rgba(255,255,255,0.05));
        }
        .hero-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
            margin-top: 30px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        /* 삼성 로고 스타일의 텍스트 락업 */
        .hero-text-lockup {
            display: inline-block;
            text-align: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #fff;
        }
        .hero-title-top {
            font-size: 2.45rem;
            font-weight: 700;
            letter-spacing: 12.5px;
            margin-right: -12.5px;
            margin-bottom: 5px;
        }
        .hero-title-bottom {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin-right: -10px;
        }

        /* Header Navigation */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--header-border);
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }
        header.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
        }
        header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        header h1 span { color: var(--accent-blue); opacity: 0.7; }
        
        .ai-prompt {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #888;
            margin-top: 2px;
            min-height: 18px;
        }
        .cursor-blink {
            display: inline-block;
            width: 5px;
            height: 10px;
            background-color: var(--accent-blue);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }
        .nav-links li a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.3s ease, opacity 0.3s ease;
            position: relative;
            opacity: 0.7;
        }
        .nav-links li a:hover {
            opacity: 1;
        }
        .nav-links li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: var(--text-color);
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-links li a:hover::after { width: 100%; }

        /* Theme Toggle */
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-color);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.7;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(15deg); opacity: 1; }

        /* Portfolio Container */
        .portfolio-container {
            max-width: 1200px;
            margin: 120px auto 120px auto; 
            padding: 0 20px;
        }

        /* Page Item - Sleek Detail Page Style */
        .page-item {
            margin-bottom: 120px;
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s ease;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 40px var(--card-shadow);
            overflow: hidden;
            scroll-margin-top: 100px;
        }
        .page-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .page-item:hover {
            box-shadow: 0 30px 60px var(--card-shadow-hover);
            transform: translateY(-4px);
        }

        /* Image Styles */
        .page-item img {
            display: block;
            width: 100%;
            height: auto;
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page-item img:hover {
            transform: scale(1.02);
        }

        /* Link Button Container */
        .link-container {
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: var(--link-container-bg);
            border-top: 1px solid var(--header-border);
        }

        /* Hyperlink Button Design - 삼성 블루 복원 & 형태 세련되게 */
        .video-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 28px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffffff;
            background-color: var(--accent-blue);
            text-decoration: none;
            border-radius: 40px;
            border: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 0.3px;
            box-shadow: 0 4px 15px rgba(20, 40, 160, 0.2);
        }
        .video-btn::before {
            content: '▶';
            margin-right: 8px;
            font-size: 0.7rem;
            color: #ffffff;
            transition: color 0.4s ease;
        }
        .video-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(20, 40, 160, 0.4);
        }

        /* Lightbox Styles */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            opacity: 0;
            transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .lightbox.show {
            display: flex;
            opacity: 1;
        }
        .lightbox img {
            max-width: 95%;
            max-height: 95vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .lightbox.show img { transform: scale(1); }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 35px;
            font-weight: 300;
            z-index: 100;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }
        .lightbox-close:hover {
            opacity: 1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 80px 20px;
            font-size: 0.8rem;
            color: #888;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            * { cursor: auto; }
            .cursor-dot, .cursor-outline { display: none; }
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .nav-links { gap: 20px; font-size: 0.85rem; }
            .theme-toggle { position: absolute; top: 15px; right: 20px; }
            .ai-prompt { display: none; }
            
            .hero-title-top { font-size: 1.45rem; letter-spacing: 7px; margin-right: -7px; }
            .hero-title-bottom { font-size: 3rem; letter-spacing: 6px; margin-right: -6px; }
            .hero-subtext { font-size: 0.9rem; margin-top: 20px; }
            .hero-logo { width: 220px; }

            .portfolio-container { margin: 80px auto; }
            .page-item { border-radius: 16px; margin-bottom: 80px; }
        }
        @media (max-width: 1200px) {
            .portfolio-container { padding: 0 15px; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" data-cursor></div>
    <div class="cursor-outline" data-cursor></div>

    <div id="progress-bar"></div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Fullscreen Image">
    </div>

    <section id="hero-section">
        <div class="hero-sticky">
            
            <div id="hero-adqua" class="hero-group">
                <img class="hero-logo" src="https://raw.githubusercontent.com/huni2092-jpg/portfolio-images/main/CI_Black_BG_AdQUA%20interactive.png" alt="AdQUA Logo">

            </div>
            
            <div id="hero-text" class="hero-group">
                <div class="hero-text-lockup">
                    <div class="hero-title-top">BLUE TO BLUE</div>
                    <div class="hero-title-bottom">SUNG HUN</div>
                </div>
            </div>

        </div>
    </section>

    <header id="main-header">
        <div class="logo-wrap">
            <h1>SHIN SUNG HOON <span>|</span> PORTFOLIO</h1>
            <div class="ai-prompt"><span id="typing-text"></span><span class="cursor-blink"></span></div>
        </div>
        <ul class="nav-links">
            <li><a class="hover-target" onclick="scrollToElement('page-1')">Profile</a></li>
            <li><a class="hover-target" onclick="scrollToElement('page-5')">Life Style</a></li>
            <li><a class="hover-target" onclick="scrollToElement('page-15')">F&B</a></li>
            <li><a class="hover-target" onclick="scrollToElement('page-24')">Beauty</a></li>
            <li><a class="hover-target" onclick="scrollToElement('page-28')">Etc</a></li>
        </ul>
        <button class="theme-toggle hover-target" id="theme-toggle" onclick="toggleTheme()">🌙</button>
    </header>

    <main class="portfolio-container" id="portfolio-list">
    </main>

    <footer>
        <p>SYSTEM.EXIT(0); // &copy; 2026 Shin Sung Hoon.</p>
    </footer>

    <script>
        /* Custom Cursor Logic */
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;
            
            cursorDot.style.left = `${posX}px`;
            cursorDot.style.top = `${posY}px`;
            
            cursorOutline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        function setupCursorHover() {
            const hoverTargets = document.querySelectorAll('a, button, img, .hover-target');
            hoverTargets.forEach(target => {
                target.addEventListener('mouseenter', () => cursorOutline.classList.add('cursor-hovering'));
                target.addEventListener('mouseleave', () => cursorOutline.classList.remove('cursor-hovering'));
            });
        }

        /* Scroll Animation (Hero Intro & Progress Bar) */
        const adquaGroup = document.getElementById('hero-adqua');
        const samsungGroup = document.getElementById('hero-samsung');
        const textGroup = document.getElementById('hero-text');
        const header = document.getElementById('main-header');

        window.addEventListener('scroll', () => {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            
            let scrolled = (winScroll / height) * 100;
            document.getElementById("progress-bar").style.width = scrolled + "%";

            const heroHeight = window.innerHeight;
            let progress = winScroll / heroHeight;

            let adquaOp = 1, adquaScale = 1;
            let samsungOp = 0, samsungScale = 0.95;
            let textOp = 0, textScale = 0.95;

            if (progress < 1) { 
                adquaOp = 1 - (progress * 1.5);
                adquaScale = 1 + (progress * 0.5);

                samsungOp = Math.max(0, (progress - 0.5) * 2);
                samsungScale = 0.95 + (progress * 0.05);
                
            } else if (progress < 2) { 
                adquaOp = 0;
                
                samsungOp = 1 - ((progress - 1) * 2);
                samsungScale = 1.0 + ((progress - 1) * 0.5);

                textOp = Math.max(0, (progress - 1.5) * 2);
                textScale = 0.95 + ((progress - 1.5) * 0.05);
                
            } else { 
                adquaOp = 0;
                samsungOp = 0;
                textOp = 1;
                textScale = 1;
            }

            adquaGroup.style.opacity = Math.max(0, Math.min(1, adquaOp));
            adquaGroup.style.transform = `scale(${adquaScale})`;

            samsungGroup.style.opacity = Math.max(0, Math.min(1, samsungOp));
            samsungGroup.style.transform = `scale(${samsungScale})`;

            textGroup.style.opacity = Math.max(0, Math.min(1, textOp));
            textGroup.style.transform = `scale(${textScale})`;

            if (progress >= 2) {
                header.classList.add('visible');
            } else {
                header.classList.remove('visible');
            }
        });

        /* AI Typing Effect */
        const textToType = "> Prompt: Generate an AI Expert Art Director... Done.";
        const typeSpeed = 50; 
        const delayBetweenLoops = 4000; 
        let charIndex = 0;
        
        function typeWriter() {
            if (charIndex < textToType.length) {
                document.getElementById("typing-text").innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, typeSpeed);
            } else {
                setTimeout(() => {
                    document.getElementById("typing-text").innerHTML = "";
                    charIndex = 0;
                    typeWriter();
                }, delayBetweenLoops);
            }
        }
        setTimeout(typeWriter, 1000);

        /* Link Data & Content Generation */
        const pageLinks = {
            6: [
                { title: "대다모 캠페인 영상 1", url: "https://www.youtube.com/watch?v=ry7HVj5LCIc" },
                { title: "대다모 캠페인 영상 2", url: "https://www.youtube.com/watch?v=X8Br4d-IzSk" }
            ],
            8: [
                { title: "대다모 헤어리즘 영상", url: "https://www.youtube.com/watch?v=GDVkB8L-d3A" }
            ],
            9: [
                { title: "블루 ABC 데이 영상", url: "https://www.youtube.com/watch?v=hvTQfvWBehY&si=exzTeKqGgaFrlJoL" }
            ],
            11: [
                { title: "블랙 ABC 데이 영상", url: "https://www.youtube.com/watch?v=vfh5X2mjWWI" }
            ],
            12: [
                { title: "U+ 폴더블7 런칭 캠페인", url: "https://www.youtube.com/watch?v=CpGVzs3c0_s" }
            ],
            14: [
                { title: "티머니GO 퍼포먼스 영상", url: "https://www.youtube.com/watch?v=hgRz4gRuo-A" }
            ],
            16: [
                { title: "써브웨이 잠봉 컬렉션 영상", url: "https://www.youtube.com/watch?v=2Tuys3QTjM4" }
            ],
            18: [
                { title: "써브웨이 썹픽 캠페인 1", url: "https://www.youtube.com/watch?time_continue=1&v=-1eeVl8ObE0&embeds_referring_euri=https%3A%2F%2Fwww.adqua.co.kr%2F&source_ve_path=Mjg2NjY" },
                { title: "써브웨이 썹픽 캠페인 2", url: "https://www.youtube.com/watch?v=uGP6-ELEBOU" }
            ],
            21: [
                { title: "써브웨이 60주년 필름", url: "https://www.youtube.com/watch?v=cgoHTpFWKDQ" }
            ],
            22: [
                { title: "사세 캠페인 영상 1", url: "https://www.youtube.com/watch?v=0y4KND0F37w" },
                { title: "사세 캠페인 영상 2", url: "https://www.youtube.com/watch?v=ACOHpNnHLWw" }
            ],
            23: [
                { title: "하루야채 캠페인 영상", url: "https://www.youtube.com/watch?v=pQ6D-J1KxXU" }
            ],
            25: [
                { title: "더마펌 캠페인 영상 1", url: "https://www.youtube.com/watch?v=puTpPsK-WZg" },
                { title: "더마펌 캠페인 영상 2", url: "https://www.youtube.com/watch?v=AuxWxMIl0m4&si=F1RvCMY7R_Qom_Jy" }
            ],
            26: [
                { title: "가히 캠페인 영상 1", url: "https://tvcf.co.kr/play/bh05525-896869" },
                { title: "가히 캠페인 영상 2", url: "https://tvcf.co.kr/play/ah06567-896682" },
                { title: "가히 캠페인 영상 3", url: "https://tvcf.co.kr/play/bh02644-897733" }
            ],
            27: [
                { title: "플랜트콜라겐 영상 1", url: "https://www.youtube.com/watch?v=6yhMSjBaZME" },
                { title: "플랜트콜라겐 영상 2", url: "https://www.youtube.com/watch?v=GsU7NtayUew" }
            ],
            28: [
                { title: "기타 TVCF 영상", url: "https://star.tvcf.co.kr/IL0223162E6CD/shots" }
            ]
        };

        const totalPages = 28;
        const container = document.getElementById('portfolio-list');

        for (let i = 1; i <= totalPages; i++) {
            const article = document.createElement('article');
            article.className = 'page-item';
            article.id = `page-${i}`;

            const img = document.createElement('img');
            
            const gitHubImgUrl = `https://raw.githubusercontent.com/huni2092-jpg/portfolio-images/main/${i}.jpg`;
            img.src = gitHubImgUrl;
            
            img.alt = `Portfolio Page ${i}`;
            img.loading = "lazy";
            img.classList.add('hover-target');
            
            img.onclick = () => openLightbox(gitHubImgUrl); 
            
            article.appendChild(img);

            if (pageLinks[i]) {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'link-container';

                pageLinks[i].forEach(link => {
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = 'video-btn hover-target';
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.textContent = link.title;
                    linkContainer.appendChild(a);
                });

                article.appendChild(linkContainer);
            }

            container.appendChild(article);
        }

        setupCursorHover();

        /* Scroll Fade-in Animation */
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.15
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target); 
                }
            });
        }, observerOptions);

        document.querySelectorAll('.page-item').forEach(item => {
            observer.observe(item);
        });

        /* 직관적이고 깔끔한 기본 스크롤 이동 */
        function scrollToElement(id) {
            const targetElement = document.getElementById(id);
            if (targetElement) {
                const headerOffset = 90;
                const elementPosition = targetElement.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            }
        }

        /* Dark Mode Toggle */
        let isDarkMode = false;
        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-toggle');
            
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                body.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️';
            } else {
                body.removeAttribute('data-theme');
                themeBtn.textContent = '🌙';
            }
        }

        /* Lightbox Logic */
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden'; 
            cursorOutline.classList.remove('cursor-hovering');
        }

        function closeLightbox() {
            lightbox.classList.remove('show');
            document.body.style.overflow = ''; 
        }
        
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
